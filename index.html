<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設定判別ツール</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #333;
    --accent: #f0b429;
    --accent2: #e05c2a;
    --text: #f0f0f0;
    --text2: #999;
    --s1: #e74c3c;
    --s2: #e67e22;
    --s3: #f1c40f;
    --s4: #2ecc71;
    --s5: #3498db;
    --s6: #9b59b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif; font-size: 14px; min-height: 100vh; }

  header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 16px; text-align: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
  header h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 2px; }
  header p { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .container { max-width: 540px; margin: 0 auto; padding: 12px; }

  .card { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); }
  .card-title { font-size: 12px; color: var(--accent); font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; text-transform: uppercase; }

  select, input[type="number"] {
    background: var(--surface2); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; width: 100%; font-size: 14px; outline: none;
    -webkit-appearance: none; appearance: none;
  }
  select:focus, input:focus { border-color: var(--accent); }

  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .row label { font-size: 12px; color: var(--text2); white-space: nowrap; min-width: 100px; }
  .row input { flex: 1; text-align: center; }
  .row .unit { font-size: 11px; color: var(--text2); white-space: nowrap; }
  .slash { font-size: 16px; color: var(--text2); padding: 0 2px; }

  .element-block { background: var(--surface2); border-radius: 10px; padding: 12px; margin-bottom: 8px; border: 1px solid var(--border); }
  .element-name { font-size: 13px; font-weight: 600; margin-bottom: 8px; }
  .element-desc { font-size: 11px; color: var(--text2); margin-bottom: 8px; }
  .input-row { display: flex; gap: 6px; align-items: center; }
  .input-row input { width: 80px; text-align: center; flex: none; }
  .input-row span { color: var(--text2); font-size: 13px; }
  .total-hint { font-size: 11px; color: var(--text2); margin-top: 4px; }

  /* 結果 */
  .result-block { margin-bottom: 6px; }
  .result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .setting-label { font-size: 13px; font-weight: 700; min-width: 52px; }
  .pct-label { font-size: 13px; font-weight: 700; min-width: 52px; text-align: right; }
  .bar-wrap { flex: 1; height: 22px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin: 0 8px; }
  .bar { height: 100%; border-radius: 4px; transition: width 0.3s ease; }

  .s1 { color: var(--s1); } .bar-s1 { background: var(--s1); }
  .s2 { color: var(--s2); } .bar-s2 { background: var(--s2); }
  .s3 { color: var(--s3); } .bar-s3 { background: var(--s3); }
  .s4 { color: var(--s4); } .bar-s4 { background: var(--s4); }
  .s5 { color: var(--s5); } .bar-s5 { background: var(--s5); }
  .s6 { color: var(--s6); } .bar-s6 { background: var(--s6); }

  .best-setting { text-align: center; padding: 14px; background: var(--surface2); border-radius: 10px; margin-bottom: 12px; border: 1px solid var(--border); }
  .best-setting .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .best-setting .value { font-size: 28px; font-weight: 800; }
  .best-setting .sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .ref-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 8px; }
  .ref-table th { background: var(--surface2); padding: 5px 4px; text-align: center; color: var(--text2); }
  .ref-table td { padding: 5px 4px; text-align: center; border-bottom: 1px solid var(--border); }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 12px; }
  .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; cursor: pointer; font-size: 13px; background: var(--surface); border: 1px solid var(--border); color: var(--text2); transition: all 0.2s; }
  .tab.active { background: var(--accent); color: #000; font-weight: 700; border-color: var(--accent); }

  .no-data { text-align: center; color: var(--text2); padding: 20px; font-size: 13px; }

  .reset-btn { width: 100%; padding: 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text2); font-size: 14px; cursor: pointer; margin-top: 8px; }
  .reset-btn:hover { background: var(--border); color: var(--text); }

  .tip { font-size: 11px; color: var(--text2); background: var(--surface2); border-radius: 6px; padding: 8px 10px; margin-top: 8px; border-left: 3px solid var(--accent); }

  /* パスワードモーダル */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:center; justify-content:center; }
  .modal-overlay.active { display:flex; }
  .modal-box { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px 20px; width:90%; max-width:360px; }
  .modal-title { font-size:16px; font-weight:700; color:var(--accent); margin-bottom:6px; }
  .modal-sub { font-size:12px; color:var(--text2); margin-bottom:16px; }
  .modal-input { background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:8px; padding:12px; width:100%; font-size:15px; outline:none; letter-spacing:2px; }
  .modal-input:focus { border-color:var(--accent); }
  .modal-error { font-size:12px; color:var(--s1); margin-top:8px; min-height:18px; }
  .modal-btn { width:100%; padding:13px; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; margin-top:12px; }
  .modal-btn-ok { background:var(--accent); color:#000; }
  .modal-btn-cancel { background:var(--surface2); color:var(--text2); margin-top:6px; }
  .lock-badge { font-size:11px; background:#333; color:var(--accent); border-radius:4px; padding:1px 5px; margin-left:4px; }
</style>
</head>
<body>

<header>
  <h1>🎰 設定判別ツール</h1>
  <p>各データを入力するとベイズ推定で設定確率をリアルタイム表示</p>
</header>

<!-- パスワードモーダル -->
<div class="modal-overlay" id="pw-modal">
  <div class="modal-box">
    <div class="modal-title">🔒 パスワードを入力</div>
    <div class="modal-sub" id="pw-modal-machine">この機種はnoteで販売中のパスワードが必要です</div>
    <input class="modal-input" type="password" id="pw-input" placeholder="パスワード" autocomplete="off" onkeydown="if(event.key==='Enter')checkPw()">
    <div class="modal-error" id="pw-error"></div>
    <button class="modal-btn modal-btn-ok" onclick="checkPw()">✓ 解除する</button>
    <button class="modal-btn modal-btn-cancel" onclick="closePwModal()">キャンセル</button>
  </div>
</div>

<div class="container">

  <!-- 機種選択 -->
  <div class="card">
    <div class="card-title">🎮 機種選択</div>
    <input type="text" id="machine-search" placeholder="🔍 機種名を検索..." oninput="filterMachines()" style="margin-bottom:8px">
    <select id="machine-select">
      <option value="">機種を選んでください</option>
    </select>
  </div>

  <!-- タブ -->
  <div class="tab-bar" id="tab-bar" style="display:none">
    <div class="tab active" onclick="switchTab('input')">📝 入力</div>
    <div class="tab" onclick="switchTab('result')">📊 結果</div>
    <div class="tab" onclick="switchTab('ref')">📋 参考値</div>
  </div>

  <div id="tab-input">
    <!-- 総ゲーム数 -->
    <div class="card" id="games-card" style="display:none">
      <div class="card-title">🎲 総ゲーム数</div>
      <div class="row">
        <input type="number" id="total-games" placeholder="例: 3000" min="0" oninput="recalc()">
        <span class="unit">G</span>
      </div>
    </div>
    <!-- 要素入力エリア -->
    <div id="elements-area"></div>
    <button class="reset-btn" id="reset-btn" style="display:none" onclick="resetAll()">🔄 データをリセット</button>
  </div>

  <div id="tab-result" style="display:none">
    <div id="result-area" class="card">
      <div class="no-data">機種を選択してデータを入力してください</div>
    </div>
  </div>

  <div id="tab-ref" style="display:none">
    <div class="card" id="ref-area">
      <div class="no-data">機種を選択してください</div>
    </div>
  </div>

</div>

// ───────────────────────────────────────────
// SHA-256 ハッシュ計算（Web Crypto API）
// ───────────────────────────────────────────
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

    <button onclick="genHash()" style="width:100%;background:#f0b429;color:#000;border:none;border-radius:6px;padding:8px;font-weight:700;cursor:pointer;font-size:13px">ハッシュを生成</button>

  const pw = document.getElementById('dev-pw').value;

  document.getElementById('dev-hash').innerHTML = `<b style="color:#fff">コピーしてpasswordHashに貼り付け:</b><br><code style="color:#f0b429">${hash}</code>`;
}

function openPwModal(machineId) {
  pendingMachineId = machineId;
  const m = MACHINES.find(x => x.id === machineId);
  document.getElementById('pw-modal-machine').textContent = `🔒 ${m?.name} はnoteで販売中のパスワードが必要です`;
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-error').textContent = '';
  document.getElementById('pw-modal').classList.add('active');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}
function closePwModal() {
  document.getElementById('pw-modal').classList.remove('active');
  document.getElementById('machine-select').value = '';
  pendingMachineId = null;
}
async function checkPw() {
  const input = document.getElementById('pw-input').value;
  if (!input) { document.getElementById('pw-error').textContent = 'パスワードを入力してください'; return; }
  const m = MACHINES.find(x => x.id === pendingMachineId);
  if (!m) return;
  const hash = await sha256(input);
  if (hash === m.passwordHash) {
    unlockedMachines.add(pendingMachineId);
    document.getElementById('pw-modal').classList.remove('active');
    const id = pendingMachineId;
    pendingMachineId = null;
    document.getElementById('machine-select').value = id;
    activateMachine(id);
  } else {
    document.getElementById('pw-error').textContent = 'パスワードが違います';
    document.getElementById('pw-input').select();
  }
}

  const q = document.getElementById('machine-search').value.trim().toLowerCase();
  const sel = document.getElementById('machine-select');
  const current = sel.value;
  sel.innerHTML = '<option value="">機種を選んでください</option>';
  MACHINES.filter(m => m.name.toLowerCase().includes(q)).forEach(m => {
    const opt = document.createElement('option');
    opt.value = m.id;
    opt.textContent = m.locked ? `🔒 ${m.name}` : m.name;

function onMachineChange() {
  const id = document.getElementById('machine-select').value;
  if (!id) { currentMachine = null; hideTabs(); return; }
  const m = MACHINES.find(x => x.id === id);
  // ロック済み かつ 未解除 かつ 開発者モードでない → モーダルを出す
  if (m?.locked && !unlockedMachines.has(id) && !isDev) {
    openPwModal(id);
    return;
  }
  activateMachine(id);
}

  currentMachine = MACHINES.find(m => m.id === id);

// ───────────────────────────────────────────
// ベイズ推定で設定確率を計算
// ───────────────────────────────────────────
function recalc() {
  if (!currentMachine) return;

  const totalGames = parseInt(document.getElementById('total-games').value) || 0;
  const N_SETTINGS = 6;
  // 対数尤度（log-likelihood）を設定1〜6で計算
  const logLik = new Array(N_SETTINGS).fill(0);

  let hasAnyData = false;

  currentMachine.elements.forEach(el => {
    if (el.type === 'select') {
      // 演出選択型：選択された演出の確率ウェイトをlog尤度に加算
      const sel = document.getElementById(`select-${el.id}`);
      if (!sel || sel.value === '') return;
      const optIdx = parseInt(sel.value);
      const opt = el.options[optIdx];
      if (!opt) return;
      // uniformなら（スキップ選択）何もしない
      if (opt.probs.every(p => p === 1)) return;
      hasAnyData = true;
      for (let s = 0; s < N_SETTINGS; s++) {
        const p = Math.max(1e-9, opt.probs[s]);
        logLik[s] += Math.log(p);
      }
      return;
    }

    // カウント型（既存）
    const countEl = document.getElementById(`count-${el.id}`);
    if (!countEl) return;
    const count = parseInt(countEl.value);
    if (isNaN(count) || count < 0) return;

    let n;
    if (el.hasOwnTotal) {
      const totalEl = document.getElementById(`total-${el.id}`);
      n = totalEl ? (parseInt(totalEl.value) || 0) : 0;
    } else {
      n = totalGames;
    }
    if (n <= 0) return;
    hasAnyData = true;

    for (let s = 0; s < N_SETTINGS; s++) {
      const p = el.probs[s];
      const clampedP = Math.max(1e-9, Math.min(1 - 1e-9, p));
      logLik[s] += count * Math.log(clampedP) + (n - count) * Math.log(1 - clampedP);
    }
  });

  if (!hasAnyData) {
    renderResult([1/6, 1/6, 1/6, 1/6, 1/6, 1/6], false);
    return;
  }

  // 数値安定化のため最大値を引いてexpして正規化
  const maxLog = Math.max(...logLik);
  const raw = logLik.map(l => Math.exp(l - maxLog));
  const sum = raw.reduce((a, b) => a + b, 0);
  const probs = raw.map(v => v / sum);

  renderResult(probs, true);
}

// 結果表示
// ───────────────────────────────────────────
const SETTING_COLORS = ['s1','s2','s3','s4','s5','s6'];
const SETTING_NAMES = ['設定1','設定2','設定3','設定4','設定5','設定6'];

function renderResult(probs, hasData) {
  const area = document.getElementById('result-area');
  const bestIdx = probs.indexOf(Math.max(...probs));
  const bestPct = (probs[bestIdx] * 100).toFixed(1);

  let html = '';

  if (hasData) {
    html += `
      <div class="best-setting">
        <div class="label">最有力設定</div>
        <div class="value ${SETTING_COLORS[bestIdx]}">${SETTING_NAMES[bestIdx]}</div>
        <div class="sub">確率 ${bestPct}%</div>
      </div>
    `;
  }

  html += '<div class="card-title">設定別確率</div>';

  probs.forEach((p, i) => {
    const pct = (p * 100).toFixed(1);
    const barWidth = Math.round(p * 100);
    html += `
      <div class="result-block">
        <div class="result-header">
          <span class="setting-label ${SETTING_COLORS[i]}">${SETTING_NAMES[i]}</span>
          <div class="bar-wrap"><div class="bar bar-${SETTING_COLORS[i]}" style="width:${barWidth}%"></div></div>
          <span class="pct-label ${SETTING_COLORS[i]}">${pct}%</span>
        </div>
      </div>
    `;
  });

  if (!hasData) {
    html += `<div class="tip">データを入力すると設定確率が表示されます。<br>入力は0でもOK（0回数として計算します）。</div>`;
  }

  area.innerHTML = html;
  area.className = 'card';
}

  let html = `<div class="card-title">設定差データ（目安）</div>`;

    html += `<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--accent)">${el.name}</div>`;
    if (el.type === 'select') {
      // 演出選択型：選択肢と設定別ウェイトを表示
      html += `<table class="ref-table"><tr><th>選択肢</th>`;
      for (let s = 1; s <= 6; s++) html += `<th class="${SETTING_COLORS[s-1]}">設${s}</th>`;
      html += `</tr>`;
      el.options.filter(o => !o.probs.every(p => p === 1)).forEach(opt => {
        html += `<tr><td style="text-align:left;padding:4px 6px;font-size:10px">${opt.label}</td>`;
        opt.probs.forEach((p, i) => {
          const display = p < 0.01 ? '極低' : (p * 100).toFixed(0) + '%';
          html += `<td class="${SETTING_COLORS[i]}">${display}</td>`;
        });
        html += `</tr>`;
      });
      html += `</table>`;
      if (el.note) html += `<div style="font-size:10px;color:var(--accent);margin-top:4px">💡 ${el.note}</div>`;
    } else {
      // カウント型
      html += `<table class="ref-table"><tr><th>設定</th>`;
      for (let s = 1; s <= 6; s++) html += `<th class="${SETTING_COLORS[s-1]}">設定${s}</th>`;
      html += `</tr><tr><td style="color:var(--text2)">確率</td>`;
      el.probs.forEach((p, i) => {
        const display = p >= 0.01 ? (p * 100).toFixed(2) + '%' : '1/' + Math.round(1/p);
        html += `<td class="${SETTING_COLORS[i]}">${display}</td>`;
      });
      html += `</tr></table>`;
    }
    html += `</div>`;
  });

  html += `<div class="tip">※数値はあくまで目安です。機種・バージョンによって異なる場合があります。最新の攻略情報と合わせてご確認ください。</div>`;
  area.innerHTML = html;
}

  div.innerHTML = `
    <div style="display:flex;gap:6px;margin-bottom:8px">
      <input type="text" id="cname-${id}" placeholder="要素名（例: チェリー）" style="flex:1;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:13px;outline:none">
      <button onclick="document.getElementById('ce-${id}').remove()" style="background:var(--s1);color:#fff;border:none;border-radius:6px;padding:6px 10px;cursor:pointer">削除</button>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px">設定1〜6の確率を入力（例: 1/27.3 または 0.0366）</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">
      ${[1,2,3,4,5,6].map(s => `
        <div>
          <div style="font-size:10px;color:${['var(--s1)','var(--s2)','var(--s3)','var(--s4)','var(--s5)','var(--s6)'][s-1]};margin-bottom:2px">設定${s}</div>
          <input type="text" id="cp${s}-${id}" placeholder="1/27.3" style="width:100%;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px;font-size:12px;outline:none;text-align:center">
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('custom-elements').appendChild(div);
}

function parseProbInput(val) {
  val = val.trim();
  if (!val) return null;
  if (val.includes('/')) {
    const parts = val.split('/');
    if (parts.length === 2) return parseFloat(parts[0]) / parseFloat(parts[1]);
  }
  return parseFloat(val);
}

function applyCustom() {
  const elems = [];
  let valid = true;
  document.querySelectorAll('[id^="ce-custom_"]').forEach(div => {
    const id = div.id.replace('ce-', '');
    const name = document.getElementById('cname-' + id)?.value || '要素';
    const probs = [];
    for (let s = 1; s <= 6; s++) {
      const val = document.getElementById(`cp${s}-${id}`)?.value || '';
      const p = parseProbInput(val);
      if (p === null || isNaN(p)) { alert(`「${name}」の設定${s}の確率が未入力です`); valid = false; return; }
      probs.push(p);
    }
    if (!valid) return;
    elems.push({ id: id, name: name, desc: name + '回数', probs: probs });
  });
  if (!valid || elems.length === 0) { alert('少なくとも1つの要素を追加してください'); return; }

  currentMachine = { id: 'custom_applied', name: 'カスタム機種', elements: elems };
  renderElements();
  renderRef();
  recalc();
  switchTab('input');
}

// ───────────────────────────────────────────
// リセット
// ───────────────────────────────────────────
function resetAll() {
  document.getElementById('total-games').value = '';
  if (!currentMachine) return;
  currentMachine.elements.forEach(el => {
    if (el.type === 'select') {
      const s = document.getElementById('select-' + el.id);
      if (s) s.value = '';
    } else {
      const c = document.getElementById('count-' + el.id);
      if (c) c.value = '';
      if (el.hasOwnTotal) {
        const t = document.getElementById('total-' + el.id);
        if (t) t.value = '';
      }
    }
  });
  recalc();
}
</script>
</body>
